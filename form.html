<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A form for submitting product reviews, including ratings, features, and comments.">
    <meta name="author" content="Bongani Brighton Sibanda ">
    <title>Product Review Form</title>

    <link rel="stylesheet" href="styles/form.css">
     
</head>
<body>
    <<form method="get" action="review.html">
        <fieldset>
    <legend>Overall Rating</legend>

    <input type="radio" id="rating1" name="rating" value="1" required>
    <label for="rating1">☆</label>

    <input type="radio" id="rating2" name="rating" value="2">
    <label for="rating2">☆☆</label>

    <input type="radio" id="rating3" name="rating" value="3">
    <label for="rating3">☆☆☆</label>

    <input type="radio" id="rating4" name="rating" value="4">
    <label for="rating4">☆☆☆☆</label>

    <input type="radio" id="rating5" name="rating" value="5">
    <label for="rating5">☆☆☆☆☆</label>
</fieldset>

    <label for="product">Product Name</label>
    <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
        <option value="fc-1888">Flux Capacitor</option>
        <option value="fc-2050">Power Laces</option>
        <option value="fs-1987">Flying Skateboard</option>
        <option value="ac-2000">Alien Communicator</option>
    </select>

    <label for="review-date">Date of Installation</label>
    <input type="date" id="review-date" name="review-date" required>

    <fieldset>
        <legend>Useful Features</legend>

        <input type="checkbox" id="durability" name="features" value="Durability">
        <label for="durability">Durability</label>

        <input type="checkbox" id="ease-of-use" name="features" value="Ease of Use">
        <label for="ease-of-use">Ease of Use</label>

        <input type="checkbox" id="performance" name="features" value="Performance">
        <label for="performance">Performance</label>

        <input type="checkbox" id="design" name="features" value="Design">
        <label for="design">Design</label>
    </fieldset>

    <form method="get" action="review.html">

    <!-- Form fields go here -->

    <button type="submit">Submit Review</button>

</form>

</form>  

    <form>
        

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="post">Post Review</button>
    </form>
</body>

<footer>
    <p>&copy; 2026 Product Reviews. All rights reserved.</p>
    
</footer>
</html>
